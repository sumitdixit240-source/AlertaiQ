<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core.AI | Premium Node Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --accent: #6366f1;
            --glass-bg: rgba(10, 15, 30, 0.75);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #020617;
            color: #f8fafc;
            height: 100vh;
            margin: 0;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            opacity: 0.6;
        }

        .glass {
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
        }

        .main-viewport {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 120px;
            scrollbar-width: thin;
        }

        .horizontal-scroll {
            display: flex;
            overflow-x: auto;
            gap: 1.25rem;
            padding: 0.5rem 0.5rem 1.5rem 0.5rem;
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }

        .countdown-digit {
            font-family: 'JetBrains Mono', monospace;
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 6px;
            font-weight: 800;
        }

        .status-safe { border-left: 4px solid #10b981; }
        .status-warning { border-left: 4px solid #f59e0b; }
        .status-urgent { border-left: 4px solid #ef4444; }

        .loader-ring {
            border: 3px solid rgba(99, 102, 241, 0.1);
            border-left-color: #6366f1;
            border-radius: 50%;
            width: 50px; height: 50px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            background: #ef4444;
            color: white;
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 800;
            z-index: 300;
            display: none;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.3);
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.2); border-radius: 10px; }
    </style>
</head>
<body class="antialiased">

    <canvas id="bg-canvas"></canvas>
    <div id="error-toast" class="error-toast"></div>

    <div id="global-overlay" class="fixed inset-0 bg-slate-950/90 backdrop-blur-xl z-[200] flex flex-col items-center justify-center transition-opacity duration-500 opacity-0 pointer-events-none">
        <div class="loader-ring mb-6"></div>
        <p id="overlay-text" class="text-[11px] font-black uppercase tracking-[0.4em] text-indigo-400">Synchronizing Data</p>
    </div>

    <header class="glass m-4 md:m-6 rounded-[2.5rem] p-4 pr-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-5">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-600 to-blue-700 rounded-2xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                <i class="fa-solid fa-microchip text-2xl text-white"></i>
            </div>
            <div>
                <h2 class="text-2xl font-black tracking-tighter">Core.AI</h2>
                <p id="user-display" class="text-[9px] font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                    <span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
                    Terminal Active
                </p>
            </div>
        </div>
        <button onclick="triggerLogout()" class="px-6 py-3.5 rounded-2xl bg-slate-900/60 border border-slate-700/50 text-slate-400 hover:text-red-400 hover:border-red-500/30 transition-all text-[11px] font-black uppercase tracking-widest">
            <i class="fa-solid fa-power-off"></i>
        </button>
    </header>

    <main class="main-viewport px-4 md:px-10 space-y-10">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5 max-w-7xl mx-auto">
            <div class="glass p-8 rounded-[2.5rem] border-l-4 border-l-indigo-500">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Operational Nodes</p>
                <h3 id="stat-count" class="text-4xl font-black mt-2">0</h3>
            </div>
            <div class="glass p-8 rounded-[2.5rem]">
                <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">Cluster Allocation</p>
                <h3 id="stat-capital" class="text-4xl font-black mt-2 text-indigo-400 font-mono">₹0</h3>
            </div>
            <div class="glass p-8 rounded-[2.5rem] flex items-center justify-between">
                <div>
                    <p class="text-[10px] font-black text-slate-500 uppercase tracking-widest">AI Status</p>
                    <h3 class="text-xl font-black mt-2 text-emerald-500 italic">OPTIMAL</h3>
                </div>
                <div class="w-14 h-14 bg-emerald-500/10 rounded-full flex items-center justify-center border border-emerald-500/20">
                    <i class="fa-solid fa-brain text-emerald-500 text-xl"></i>
                </div>
            </div>
        </div>

        <section class="max-w-7xl mx-auto">
            <div class="flex items-center gap-6 mb-6">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Deploy Sector</h3>
                <div class="h-px flex-grow bg-white/5"></div>
            </div>
            <div id="category-grid" class="horizontal-scroll"></div>
        </section>

        <section class="max-w-7xl mx-auto space-y-8">
            <div class="flex items-center gap-6">
                <h3 class="text-[10px] font-black text-slate-500 uppercase tracking-[0.3em]">Active Cluster Monitoring</h3>
                <div class="h-px flex-grow bg-white/5"></div>
            </div>
            <div id="entity-list" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8"></div>
        </section>
    </main>

    <div id="modal" class="fixed inset-0 bg-slate-950/95 backdrop-blur-2xl z-[150] hidden flex items-center justify-center p-4">
        <div class="glass w-full max-w-xl rounded-[3.5rem] overflow-hidden flex flex-col shadow-2xl">
            <div class="p-10 border-b border-white/5 bg-gradient-to-br from-indigo-600/10 to-transparent flex justify-between items-center">
                <div>
                    <h3 id="modal-sector-title" class="text-3xl font-black tracking-tighter text-white">Initialize Node</h3>
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">Configure Cluster Allocation</p>
                </div>
                <button onclick="closeModal()" class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-xmark text-white"></i>
                </button>
            </div>
            <form id="entity-form" class="p-10 space-y-8">
                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Service Provider</label>
                    <select id="title" required class="w-full bg-slate-900 border border-slate-700/50 rounded-2xl px-6 py-4.5 font-bold text-slate-200 outline-none focus:border-indigo-500 transition-all"></select>
                </div>
                <div class="grid grid-cols-2 gap-6">
                    <div class="space-y-3">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Cycle</label>
                        <select id="frequency" required class="w-full bg-slate-900 border border-slate-700/50 rounded-2xl px-6 py-4.5 font-bold text-slate-200 outline-none">
                            <option value="daily">Daily</option>
                            <option value="weekly">Weekly</option>
                            <option value="monthly">Monthly</option>
                            <option value="one-time">One-time</option>
                        </select>
                    </div>
                    <div class="space-y-3">
                        <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Allocation (₹)</label>
                        <input type="number" id="amount" required min="1" placeholder="0" class="w-full bg-slate-900 border border-slate-700/50 rounded-2xl px-6 py-4.5 font-bold text-emerald-400 outline-none">
                    </div>
                </div>
                <div class="space-y-3">
                    <label class="block text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Termination/Renewal Date</label>
                    <input type="date" id="expiryDate" required class="w-full bg-slate-900 border border-slate-700/50 rounded-2xl px-6 py-4.5 font-bold text-slate-200 outline-none">
                </div>
                <button type="submit" id="submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-500 py-6 rounded-[2.5rem] text-[12px] font-black uppercase tracking-[0.3em] text-white transition-all active:scale-95 shadow-xl shadow-indigo-500/20">
                    Deploy to Cloud
                </button>
            </form>
        </div>
    </div>

    <script type="module">
        // ==========================================
        // 1. API CONFIG (ALIGNED WITH BACKEND)
        // ==========================================
        const BASE = "https://alertai-q.vercel.app/api/nodes"; 
        const getToken = () => localStorage.getItem("token");

        // ==========================================
        // 2. AUTH & ERROR HANDLING
        // ==========================================
        function handleAuthError(res) {
            if (res.status === 401 || res.status === 403) {
                localStorage.removeItem("token");
                window.location.href = "index.html";
                return true;
            }
            return false;
        }

        // ==========================================
        // 3. GLOBAL STATE
        // ==========================================
        let activeNodes = [];
        let selectedCategory = null;
        let countdownTimer = null;

        const SECTORS = [
            { id: "saas", name: "SaaS", icon: "fa-cloud", services: ["Adobe", "Slack", "Zoom", "Office 365", "Figma", "Canva", "Notion", "Dropbox", "ChatGPT Plus", "Midjourney"] },
            { id: "dev", name: "Build", icon: "fa-code", services: ["Vercel", "GitHub", "AWS", "DigitalOcean", "Supabase", "MongoDB", "Postman", "Cloudflare", "Clerk"] },
            { id: "fin", name: "Finance", icon: "fa-wallet", services: ["Stripe", "PayPal", "Amex", "HDFC", "SBI", "Robinhood", "Zerodha", "Groww", "ICICI Bank"] },
            { id: "stream", name: "Media", icon: "fa-film", services: ["Netflix", "Spotify", "Apple TV", "Prime Video", "Hulu", "Disney+", "YouTube Premium", "Crunchyroll"] },
            { id: "util", name: "Utility", icon: "fa-bolt", services: ["Electric", "Water", "Gas", "WiFi", "Broadband", "Airtel", "Jio", "Rent", "Gym"] }
        ];

        // ==========================================
        // 4. UTILITIES & COUNTDOWN ENGINE
        // ==========================================
        function getCountdown(date) {
            const diff = new Date(date) - new Date();
            if (diff <= 0) return { text: "TERMINATED", days: 0 };
            
            const d = Math.floor(diff / (1000*60*60*24));
            const h = Math.floor((diff / (1000*60*60)) % 24);
            const m = Math.floor((diff / (1000*60)) % 60);
            const s = Math.floor((diff / 1000) % 60);
            
            return {
                text: `<span class="countdown-digit">${d}D</span> <span class="countdown-digit">${h}H</span> <span class="countdown-digit">${m}M</span> <span class="countdown-digit">${s}S</span>`,
                days: d
            };
        }

        function startGlobalClock() {
            if (countdownTimer) clearInterval(countdownTimer);
            countdownTimer = setInterval(() => {
                activeNodes.forEach(node => {
                    const el = document.getElementById(`countdown-${node._id || node.id}`);
                    if (el) {
                        const cd = getCountdown(node.expiryDate);
                        el.innerHTML = cd.text;
                    }
                });
            }, 1000);
        }

        // ==========================================
        // 5. CLOUD SYNC (REF BACKEND CODE)
        // ======================
        async function syncNodes() {
            showOverlay("Synchronizing Cluster...");
            try {
                const res = await fetch(`${BASE}/all`, {
                    method: "GET",
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });
                
                const data = await res.json();
                if (handleAuthError(res)) return;

                if (res.ok) {
                    activeNodes = data.data || data.nodes || data.result || [];
                    renderUI();
                    startGlobalClock();
                } else {
                    showError(data.message || "Fetch Failed");
                }
            } catch (err) {
                showError("Mainframe Link Interrupted");
            } finally {
                hideOverlay();
            }
        }

        async function pushNodeToCloud(node) {
            if (node.amount <= 0) return showError("Invalid Allocation Amount");
            if (new Date(node.expiryDate) < new Date()) return showError("Cannot deploy to the past");

            showOverlay("Deploying Node...");
            try {
                const res = await fetch(`${BASE}/create`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${getToken()}`
                    },
                    body: JSON.stringify(node)
                });
                
                const data = await res.json();
                if (handleAuthError(res)) return;

                if (res.ok) {
                    await syncNodes(); 
                    return true;
                } else {
                    showError(data.message || data.error || "Deployment Rejected");
                    return false;
                }
            } catch (err) {
                showError("Network Error During Deployment");
                return false;
            } finally {
                hideOverlay();
            }
        }

        async function deleteNodeFromCloud(id) {
            showOverlay("Terminating Node...");
            try {
                const res = await fetch(`${BASE}/delete/${id}`, {
                    method: "DELETE",
                    headers: { "Authorization": `Bearer ${getToken()}` }
                });
                
                const data = await res.json();
                if (handleAuthError(res)) return;

                if (res.ok) {
                    await syncNodes();
                } else {
                    showError(data.message || "Termination Error");
                }
            } catch (err) {
                showError("Termination Link Error");
            } finally {
                hideOverlay();
            }
        }

        // ==========================================
        // 6. UI RENDERING
        // ==========================================
        function renderUI() {
            const list = document.getElementById('entity-list');
            list.innerHTML = '';
            let total = 0;

            activeNodes.forEach(node => {
                total += Number(node.amount || 0);
                const nodeId = node._id || node.id;
                const cd = getCountdown(node.expiryDate);
                
                let statusClass = "status-safe";
                if (cd.days < 3) statusClass = "status-urgent";
                else if (cd.days < 7) statusClass = "status-warning";

                const card = document.createElement('div');
                card.className = `glass p-8 rounded-[3rem] relative overflow-hidden group ${statusClass} transition-all duration-300 hover:scale-[1.02]`;
                
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <p class="text-[8px] font-black text-indigo-500 uppercase tracking-widest mb-1">${node.category || 'Cluster'}</p>
                            <h4 class="text-xl font-black text-white">${node.title}</h4>
                        </div>
                        <button onclick="handleDelete('${nodeId}')" class="w-10 h-10 rounded-xl bg-red-500/5 text-red-500/30 hover:bg-red-500 hover:text-white transition-all">
                            <i class="fa-solid fa-trash-can text-xs"></i>
                        </button>
                    </div>

                    <div class="mb-8">
                        <p class="text-[9px] font-bold text-slate-500 uppercase tracking-widest mb-2">Cluster Burn</p>
                        <h5 class="text-3xl font-black text-white">₹${Number(node.amount || 0).toLocaleString()} <span class="text-xs text-slate-500 font-bold uppercase">/${node.frequency}</span></h5>
                    </div>

                    <div class="bg-slate-900/60 rounded-2xl p-5 border border-white/5 space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">Time to Refresh</span>
                            <div id="countdown-${nodeId}" class="text-[10px] font-black text-indigo-400 font-mono">${cd.text}</div>
                        </div>
                        <div class="flex items-center justify-between">
                            <span class="text-[8px] font-black text-slate-500 uppercase tracking-widest">AI Analysis</span>
                            <span class="text-[9px] font-bold ${node.amount > 5000 ? 'text-orange-400' : 'text-emerald-400'} uppercase">
                                ${node.amount > 5000 ? 'High Allocation' : 'Optimized'}
                            </span>
                        </div>
                    </div>
                `;
                list.appendChild(card);
            });

            document.getElementById('stat-count').innerText = activeNodes.length;
            document.getElementById('stat-capital').innerText = `₹${total.toLocaleString()}`;
        }

        function renderCategories() {
            const grid = document.getElementById('category-grid');
            grid.innerHTML = '';
            SECTORS.forEach(s => {
                const card = document.createElement('div');
                card.className = "min-w-[140px] glass p-6 rounded-[2rem] flex flex-col items-center gap-3 transition-all hover:bg-indigo-600/10 cursor-pointer group active:scale-95";
                card.onclick = () => openModal(s);
                card.innerHTML = `
                    <div class="w-12 h-12 bg-slate-900 rounded-2xl flex items-center justify-center text-indigo-400 group-hover:scale-110 transition-transform shadow-inner">
                        <i class="fa-solid ${s.icon} text-lg"></i>
                    </div>
                    <span class="text-[9px] font-black uppercase tracking-widest text-slate-500 group-hover:text-indigo-300">${s.name}</span>
                `;
                grid.appendChild(card);
            });
        }

        // ==========================================
        // 7. EVENT HANDLERS
        // ==========================================
        window.openModal = (sector) => {
            selectedCategory = sector;
            document.getElementById('modal-sector-title').innerText = `Deploy ${sector.name}`;
            document.getElementById('title').innerHTML = sector.services.map(s => `<option value="${s}">${s}</option>`).join('');
            document.getElementById('modal').classList.remove('hidden');
        };

        window.closeModal = () => document.getElementById('modal').classList.add('hidden');
        
        window.handleDelete = async (id) => {
            if (confirm("Terminate cluster node? Data will be purged.")) {
                await deleteNodeFromCloud(id);
            }
        };

        document.getElementById('entity-form').onsubmit = async (e) => {
            e.preventDefault();
            const node = {
                title: document.getElementById('title').value,
                category: selectedCategory.name,
                frequency: document.getElementById('frequency').value,
                amount: Number(document.getElementById('amount').value),
                expiryDate: document.getElementById('expiryDate').value
            };
            if (await pushNodeToCloud(node)) closeModal();
        };

        window.triggerLogout = () => {
            localStorage.removeItem("token");
            window.location.href = "index.html"; 
        };

        function showError(msg) {
            const toast = document.getElementById('error-toast');
            toast.innerText = msg; toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 4000);
        }

        function showOverlay(t) {
            document.getElementById('overlay-text').innerText = t;
            const o = document.getElementById('global-overlay');
            o.style.opacity = '1'; o.classList.remove('pointer-events-none');
        }

        function hideOverlay() {
            const o = document.getElementById('global-overlay');
            o.style.opacity = '0'; o.classList.add('pointer-events-none');
        }

        function init3D() {
            const canvas = document.getElementById('bg-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(window.innerWidth, window.innerHeight);
            
            const stars = new THREE.BufferGeometry();
            const pos = new Float32Array(1500 * 3);
            for(let i=0; i<4500; i++) pos[i] = (Math.random() - 0.5) * 50;
            stars.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            
            const starMat = new THREE.PointsMaterial({ size: 0.05, color: 0x6366f1, transparent: true, opacity: 0.3 });
            const starPoints = new THREE.Points(stars, starMat);
            scene.add(starPoints);
            
            camera.position.z = 5;
            function animate() {
                requestAnimationFrame(animate);
                starPoints.rotation.y += 0.0002;
                renderer.render(scene, camera);
            }
            animate();
        }

        window.addEventListener('load', () => {
            init3D();
            renderCategories();
            syncNodes();
        });
    </script>
</body>
</html>
